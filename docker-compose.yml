version: "3.8"

# Phase 1 compose — PostgreSQL + Backend + Frontend
# Phase 2 will add: rabbitmq, celery_worker

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shoesbags
      POSTGRES_PASSWORD: shoesbags
      POSTGRES_DB: shoesbags
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shoesbags"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://shoesbags:shoesbags@db:5432/shoesbags
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade head &&
        python -m app.seed &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      VITE_GOOGLE_CLIENT_ID: placeholder
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
